const fromB64=s=>Uint8Array.from(atob(s),c=>c.charCodeAt(0));
async function unlock(pw){const te=new TextEncoder();const km=await crypto.subtle.importKey('raw',te.encode(pw),'PBKDF2',false,['deriveKey']);const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt:fromB64(ENC.salt),iterations:310000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:fromB64(ENC.iv)},key,fromB64(ENC.ct));return new TextDecoder().decode(pt);}
async function go(){const pw=document.getElementById('pw').value;const btn=document.getElementById('go');btn.disabled=true;btn.textContent='여는 중…';try{const html=await unlock(pw);try{sessionStorage.setItem('hy_pw',pw)}catch(e){}document.open();document.write(html);document.close();}catch(e){btn.disabled=false;btn.textContent='열기';document.getElementById('err').textContent='비밀번호가 달라 🐯';const b=document.getElementById('box');b.classList.remove('shake');void b.offsetWidth;b.classList.add('shake');}}
document.getElementById('go').onclick=go;document.getElementById('pw').addEventListener('keydown',e=>{if(e.key==='Enter')go()});(async()=>{const c=sessionStorage.getItem('hy_pw');if(c){try{const h=await unlock(c);document.open();document.write(h);document.close()}catch(e){sessionStorage.removeItem('hy_pw')}}})();
</script></body></html>
