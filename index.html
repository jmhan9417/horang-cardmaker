<style>
*{margin:0;box-sizing:border-box;font-family:Pretendard,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#EDE8DC;}
.box{background:#FAF6EE;border-radius:20px;padding:44px 40px;width:360px;box-shadow:0 12px 40px rgba(42,42,38,.18);text-align:center;}
.tiger{font-size:52px;}
h1{font-size:20px;font-weight:800;color:#1E5E58;margin:12px 0 4px;}
p{font-size:13px;color:#8a857a;font-weight:600;margin-bottom:22px;}
input{width:100%;border:1.5px solid #E1DCCE;border-radius:10px;padding:13px 14px;font-size:15px;text-align:center;letter-spacing:2px;}
input:focus{outline:2px solid #2E8079;border-color:transparent;}
button{width:100%;margin-top:12px;border:none;border-radius:10px;padding:13px;font-size:15px;font-weight:800;background:#2E8079;color:#fff;cursor:pointer;}
button:hover{background:#1E5E58;}
button:disabled{opacity:.6;cursor:wait;}
.err{color:#C2715A;font-size:13px;font-weight:700;margin-top:12px;min-height:18px;}
.shake{animation:sh .4s;}
@keyframes sh{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
</style></head>

const fromB64 = s => Uint8Array.from(atob(s), c=>c.charCodeAt(0));
async function unlock(pw){
  const te = new TextEncoder();
  const km = await crypto.subtle.importKey('raw', te.encode(pw), 'PBKDF2', false, ['deriveKey']);
  const key = await crypto.subtle.deriveKey({name:'PBKDF2', salt:fromB64(ENC.salt), iterations:310000, hash:'SHA-256'},
    km, {name:'AES-GCM', length:256}, false, ['decrypt']);
  const pt = await crypto.subtle.decrypt({name:'AES-GCM', iv:fromB64(ENC.iv)}, key, fromB64(ENC.ct));
  return new TextDecoder().decode(pt);
}
async function go(){
  const pw = document.getElementById('pw').value;
  const btn = document.getElementById('go'); btn.disabled = true; btn.textContent='여는 중…';
  try{
    const html = await unlock(pw);
    try{ sessionStorage.setItem('hy_pw', pw); }catch(e){}
    document.open(); document.write(html); document.close();
  }catch(e){
    btn.disabled=false; btn.textContent='열기';
    document.getElementById('err').textContent='비밀번호가 달라 🐯';
    const b=document.getElementById('box'); b.classList.remove('shake'); void b.offsetWidth; b.classList.add('shake');
  }
}
document.getElementById('go').onclick = go;
document.getElementById('pw').addEventListener('keydown', e=>{ if(e.key==='Enter') go(); });
// 같은 세션이면 자동 잠금해제
(async()=>{ const c = sessionStorage.getItem('hy_pw'); if(c){ try{ const h=await unlock(c); document.open(); document.write(h); document.close(); }catch(e){} } })();
</script>
